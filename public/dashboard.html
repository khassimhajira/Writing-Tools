<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0F0720" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#FAF8FF" media="(prefers-color-scheme: light)">
    <title>StealthWriter Hub | Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="FAVICON.png">
    <style>
        .auto-icon {
            width: 80px; height: 80px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 2.2rem; color: white;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
            margin-bottom: 1rem;
        }
        .service-usage-badge {
            font-variant-numeric: tabular-nums;
            transition: background 0.25s ease, border-color 0.25s ease;
        }
        @media (max-width: 600px) {
            .service-usage-badge {
                top: 6px !important;
                right: 6px !important;
                padding: 4px 8px !important;
                font-size: 0.58rem !important;
                border-radius: 12px !important;
            }
        }
        /* Floating usage pill — blends with StealthWriter's white-card style.
           Appears bottom-right when a service with a daily_limit is open. */
        #portal-usage {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 10001;
            min-width: 230px;
            max-width: 88vw;
            padding: 14px 16px 13px;
            border-radius: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            color: #0f172a;
            background: #ffffff;
            border: 1px solid rgba(15, 23, 42, 0.08);
            box-shadow:
                0 1px 2px rgba(15, 23, 42, 0.04),
                0 8px 28px rgba(15, 23, 42, 0.10);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            user-select: none;
            font-variant-numeric: tabular-nums;
        }
        #portal-usage:hover {
            box-shadow:
                0 1px 2px rgba(15, 23, 42, 0.05),
                0 14px 36px rgba(15, 23, 42, 0.13);
        }
        #portal-usage .pu-row {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        #portal-usage .pu-label {
            font-size: 0.6rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #6b7280;
        }
        #portal-usage.is-warn .pu-label { color: #b45309; }
        #portal-usage.is-crit .pu-label { color: #b91c1c; }
        #portal-usage .pu-num {
            font-size: 1.05rem; font-weight: 700; color: #0f172a;
            display: inline-flex; align-items: baseline; gap: 2px;
        }
        #portal-usage .pu-num small {
            color: #94a3b8; font-weight: 600; font-size: 0.78rem; margin-left: 2px;
        }
        #portal-usage.is-crit .pu-num { color: #b91c1c; }
        #portal-usage .pu-bar {
            height: 5px; border-radius: 99px;
            background: #f1f5f9;
            overflow: hidden; margin-top: 10px;
        }
        #portal-usage .pu-fill {
            height: 100%; border-radius: 99px;
            transition: width 0.45s cubic-bezier(.2,.9,.2,1), background 0.3s ease;
        }
        #portal-usage .pu-foot {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 9px; font-size: 0.72rem; color: #64748b;
        }
        #portal-usage .pu-foot .pu-svc {
            font-size: 0.66rem; font-weight: 600; color: #94a3b8;
            letter-spacing: 0.02em;
        }
        #portal-usage .pu-reset {
            margin-top: 4px; font-size: 0.72rem; color: #475569;
        }
        #portal-usage .pu-reset b { color: #0f172a; font-weight: 700; }

        /* Dark variant — applied when the loaded service (e.g. StealthWriter)
           is in dark mode. Detected by sampling the iframe documentElement. */
        #portal-usage.is-dark {
            background: #1f2937;
            color: #f1f5f9;
            border-color: rgba(255,255,255,0.08);
            box-shadow:
                0 1px 2px rgba(0,0,0,0.30),
                0 12px 32px rgba(0,0,0,0.45);
        }
        #portal-usage.is-dark .pu-label { color: #94a3b8; }
        #portal-usage.is-dark.is-warn .pu-label { color: #fbbf24; }
        #portal-usage.is-dark.is-crit .pu-label { color: #fca5a5; }
        #portal-usage.is-dark .pu-num { color: #ffffff; }
        #portal-usage.is-dark .pu-num small { color: #64748b; }
        #portal-usage.is-dark.is-crit .pu-num { color: #fca5a5; }
        #portal-usage.is-dark .pu-bar { background: rgba(255,255,255,0.08); }
        #portal-usage.is-dark .pu-foot { color: #94a3b8; }
        #portal-usage.is-dark .pu-foot .pu-svc { color: #64748b; }
        #portal-usage.is-dark .pu-reset { color: #cbd5e1; }
        #portal-usage.is-dark .pu-reset b { color: #ffffff; }

        @media (max-width: 600px) {
            #portal-usage {
                bottom: 18px; right: 14px; left: auto;
                min-width: 0;
                width: calc(100vw - 28px);
                max-width: 320px;
                padding: 11px 13px 10px;
                border-radius: 13px;
            }
            #portal-usage .pu-num { font-size: 0.95rem; }
        }
        /* On phones, stack the usage pill ABOVE the back button so they
           never compete for the bottom row. The back button is ~50px tall
           with 14px bottom margin = ~64px, plus 12px gap = pill at 80px. */
        @media (max-width: 768px) {
            #portal-usage {
                bottom: 80px !important;
                right: 14px !important;
                left: 14px !important;
                width: auto !important;
                max-width: none !important;
            }
        }
    </style>
</head>
<body>
    <header id="dash-header">
        <img src="LOGO.png" alt="Writing Tools" class="logo" onerror="this.outerHTML='<h2 class=\'logo\'>STEALTHWRITER</h2>'">
        <div class="header-actions">
            <div id="user-pill" style="font-size: 0.9rem; color: var(--text-secondary); background: var(--input-bg); padding: 0.3rem 0.8rem; border-radius: 20px;">
                <div class="skeleton skeleton-text" style="width: 80px; margin:0;"></div>
            </div>
            <button class="theme-toggle" id="theme-btn" title="Toggle Theme" style="background:transparent; border:none; padding:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-secondary);">
                <span id="theme-icon-container" style="display:flex; align-items:center;"></span>
            </button>
            <button id="logout-btn" style="background:transparent; color: var(--text-secondary); border:1px solid var(--border-color); padding: 0.3rem 0.8rem; width: auto;">Logout</button>
        </div>
    </header>

    <main class="container" style="display: block;">
        <div id="loading-view">
            <div class="card"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-btn"></div></div>
        </div>

        <div id="no-access-view" style="display:none; text-align:left; padding: 4rem 1rem;">
            <div style="font-size: 4rem; margin-bottom: 2rem;">🛡️</div>
            <h2 style="margin-bottom:1rem; font-weight:800;">Access Awaiting Activation</h2>
            <p style="color:var(--text-secondary); max-width:500px; margin-bottom: 2rem;">Your account is ready, but you haven't been assigned any premium tools yet. Please contact your administrator.</p>
        </div>

        <div id="ready-view">
            <div style="margin-bottom: 2.5rem;">
                <h2 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -0.02em;">MY SERVICES</h2>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Click an icon to launch your workspace.</p>
            </div>
            <div id="services-grid" style="display: flex; flex-wrap: wrap; gap: 2.5rem; justify-content: flex-start; width: 100%;"></div>
        </div>
    </main>

    <iframe id="portal-frame"></iframe>
    <button id="portal-exit" onclick="exitPortal()">
        <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path></svg>
        Back to Dashboard
    </button>
    <div id="portal-usage" style="display:none;"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentUser = null;

        function generateAutoIcon(name) {
            const letters = (name || '?').substring(0, 2).toUpperCase();
            return `<div class="auto-icon">${letters}</div>`;
        }

        // Live countdown ticker. Walks every element with .hub-countdown +
        // data-reset-at and rewrites its text every second. Single setInterval
        // for the whole page so it scales fine.
        let _countdownInterval = null;
        function formatCountdown(msLeft) {
            if (msLeft <= 0) return 'resetting…';
            const totalSec = Math.floor(msLeft / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const pad = (n) => n < 10 ? '0' + n : '' + n;
            if (h > 0) return 'resets in ' + h + 'h ' + pad(m) + 'm ' + pad(s) + 's';
            if (m > 0) return 'resets in ' + m + 'm ' + pad(s) + 's';
            return 'resets in ' + s + 's';
        }
        function tickCountdowns() {
            const nodes = document.querySelectorAll('.hub-countdown');
            if (nodes.length === 0) return;
            let anyExpired = false;
            const now = Date.now();
            nodes.forEach((el) => {
                const resetAt = parseInt(el.getAttribute('data-reset-at'), 10);
                if (!resetAt) return;
                const diff = resetAt - now;
                if (diff <= 0) {
                    el.textContent = 'resetting…';
                    anyExpired = true;
                } else {
                    el.textContent = formatCountdown(diff);
                }
            });
            // If any countdown expired, refresh from server so the badge can
            // turn green again.
            if (anyExpired) {
                clearInterval(_countdownInterval);
                _countdownInterval = null;
                setTimeout(() => init(), 1500);
            }
        }
        function startCountdownTicker() {
            if (_countdownInterval) clearInterval(_countdownInterval);
            tickCountdowns();
            _countdownInterval = setInterval(tickCountdowns, 1000);
        }

        async function init() {
            try {
                const userRes = await fetch('/hub/api/auth/me');
                if (userRes.status === 401) {
                    // Could be unauthenticated OR kicked from another device.
                    let body = null;
                    try { body = await userRes.json(); } catch (_) {}
                    if (body && body.code === 'KICKED') {
                        // Friendly notice, then bounce to login.
                        document.body.innerHTML = '<div style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;text-align:center;padding:14% 20px;color:var(--text-primary,#0f172a);max-width:480px;margin:0 auto;">'
                            + '<div style="font-size:48px;margin-bottom:12px;">&#128274;</div>'
                            + '<h2 style="color:var(--pt-primary,#7C3AED);margin:0 0 8px;">Session ended</h2>'
                            + '<p style="color:var(--text-secondary,#475569);margin:0 0 16px;line-height:1.5;">You signed in on another device. To use Scholar Genie here, log in again.</p>'
                            + '<a href="https://app.scholargenie.org/login?amember_redirect_url=https://app.scholargenie.org/content/p/id/1/" '
                            + 'style="display:inline-block;background:linear-gradient(135deg,var(--pt-primary,#7C3AED),var(--pt-mid,#8B5CF6));color:#fff;font-weight:700;padding:12px 22px;border-radius:12px;text-decoration:none;">Log in again &rarr;</a></div>';
                        return;
                    }
                    throw new Error('Unauthenticated');
                }
                if (!userRes.ok) throw new Error();
                currentUser = await userRes.json();
                document.getElementById('user-pill').innerHTML = currentUser.username;

                const servicesRes = await fetch('/hub/api/auth/services');
                const services = await servicesRes.json();

                document.getElementById('loading-view').style.display = 'none';
                
                if (services && services.length > 0) {
                    document.getElementById('ready-view').style.display = 'flex';
                    document.getElementById('no-access-view').style.display = 'none';
                    
                    document.getElementById('services-grid').innerHTML = services.map(s => {
                        const limit = s.daily_limit || 0;
                        const used = s.used_today || 0;
                        const remaining = limit ? Math.max(0, limit - used) : null;
                        let badgeHTML = '';
                        if (limit > 0) {
                            // Three states: plenty (>33%), warning (10-33%), critical (<=10% or 0).
                            const pct = remaining / limit;
                            const tone = remaining <= 0 ? 'crit' : (pct <= 0.33 ? 'warn' : 'ok');
                            const colors = {
                                ok:   { ring: 'rgba(16,185,129,0.65)',  text: '#a7f3d0' },
                                warn: { ring: 'rgba(245,158,11,0.7)',   text: '#fde68a' },
                                crit: { ring: 'rgba(248,113,113,0.75)', text: '#fecaca' }
                            }[tone];
                            const resetAttr = s.reset_at ? ('data-reset-at="' + s.reset_at + '"') : '';
                            const labelTxt = remaining > 0
                                ? (remaining + ' / ' + limit + ' left today')
                                : 'Limit reached';
                            const subTxt = (remaining <= 0 && s.reset_at)
                                ? '<span class="hub-countdown" ' + resetAttr + '></span>'
                                : '';
                            badgeHTML = '<div class="service-usage-badge" style="' +
                                'position:absolute;top:8px;right:8px;z-index:5;' +
                                'padding:5px 10px;border-radius:14px;font-size:0.62rem;font-weight:600;letter-spacing:0.02em;' +
                                'color:' + colors.text + ';' +
                                'backdrop-filter:blur(14px) saturate(180%);-webkit-backdrop-filter:blur(14px) saturate(180%);' +
                                'background:rgba(15,23,42,0.55);' +
                                'border:1px solid ' + colors.ring + ';' +
                                'box-shadow:0 4px 14px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.1);' +
                                'pointer-events:none;text-align:center;line-height:1.3;max-width:90%;' +
                            '">' + labelTxt + (subTxt ? '<br><span style="font-weight:500;font-size:0.92em;opacity:0.92;">' + subTxt + '</span>' : '') + '</div>';
                        }
                        return `
                        <div class="service-wrapper" style="position:relative;">
                            ${badgeHTML}
                            <div class="service-logo-card animate-in" onclick="launchPortal('${s.slug}')" title="Launch ${s.name}">
                                <div class="logo-composite ${s.slug === 'stealth' ? 'invert-dark' : ''}">
                                    <div class="logo-icon">
                                        ${s.icon_svg ? (
                                            s.icon_svg.trim().startsWith('<svg') || s.icon_svg.trim().startsWith('<div') 
                                            ? s.icon_svg 
                                            : `<img src="${s.icon_svg}" alt="" style="height:100%; width:100%; object-fit:contain;">`
                                        ) : generateAutoIcon(s.name)}
                                    </div>
                                    <div class="logo-text">${s.text_svg || `<span>${s.name}</span>`}</div>
                                </div>
                                <div class="status-overlay"></div>
                            </div>
                        </div>
                        `;
                    }).join('');
                    startCountdownTicker();


                } else {
                    document.getElementById('ready-view').style.display = 'none';
                    document.getElementById('no-access-view').style.display = 'block';
                }

                const token = document.cookie.split('; ').find(row=>row.startsWith('stealth_hub_token='))?.split('=')[1];
                if (token) socket.emit('authenticate', token);
            } catch(e) { window.location.href = '/'; }
        }

        function launchPortal(slug) {
            document.body.classList.add('portal-open');
            const frame = document.getElementById('portal-frame');
            frame.src = '/proxy/' + slug.trim();
            frame.style.display = 'block';
            document.getElementById('portal-exit').style.display = 'flex';
            startPortalUsage(slug.trim());
        }

        function exitPortal() {
            document.body.classList.remove('portal-open');
            document.getElementById('portal-frame').src = 'about:blank';
            document.getElementById('portal-frame').style.display = 'none';
            document.getElementById('portal-exit').style.display = 'none';
            stopPortalUsage();
        }

        // ---- Floating Usage Pill (bottom-right, mirrors Back to Dashboard) ----
        let _puData = null, _puPoll = null, _puTick = null, _puSlug = null;
        function _puPad(n) { return n < 10 ? '0' + n : '' + n; }
        function _puFmt(ms) {
            if (ms <= 0) return 'resetting…';
            const t = Math.floor(ms / 1000);
            const h = Math.floor(t / 3600);
            const m = Math.floor((t % 3600) / 60);
            const s = t % 60;
            if (h > 0) return h + 'h ' + _puPad(m) + 'm ' + _puPad(s) + 's';
            if (m > 0) return m + 'm ' + _puPad(s) + 's';
            return s + 's';
        }
        async function _puFetch() {
            if (!_puSlug) return;
            try {
                const r = await fetch('/hub/api/auth/my-usage/' + encodeURIComponent(_puSlug), { credentials: 'include' });
                if (!r.ok) return;
                _puData = await r.json();
                _puPaint();
            } catch(_) {}
        }
        function _puPaint() {
            const el = document.getElementById('portal-usage');
            if (!el) return;
            if (!_puData || !_puData.limited) { el.style.display = 'none'; return; }

            const limit = _puData.service.daily_limit;
            const used = _puData.used || 0;
            const remaining = _puData.remaining != null ? _puData.remaining : Math.max(0, limit - used);
            const pct = limit > 0 ? Math.min(100, (used / limit) * 100) : 0;
            const tone = remaining <= 0 ? 'crit' : (remaining / limit <= 0.33 ? 'warn' : 'ok');
            const palette = {
                ok:   { fill: 'linear-gradient(90deg,#22c55e,#16a34a)', label: 'Daily usage' },
                warn: { fill: 'linear-gradient(90deg,#f59e0b,#ea580c)', label: 'Running low' },
                crit: { fill: 'linear-gradient(90deg,#ef4444,#dc2626)', label: 'Limit reached' }
            }[tone];

            // Set tone class so the styled classes (is-ok / is-warn / is-crit)
            // can recolor labels without re-rendering on every poll.
            el.classList.remove('is-ok', 'is-warn', 'is-crit');
            el.classList.add('is-' + tone);

            const resetLine = (_puData.reset_at && remaining <= 0)
                ? '<div class="pu-reset">Resets in <b id="pu-reset-cd">…</b></div>'
                : '';

            el.innerHTML =
                '<div class="pu-row">' +
                    '<div class="pu-label">' + palette.label + '</div>' +
                    '<div class="pu-num">' + used + '<small>/ ' + limit + '</small></div>' +
                '</div>' +
                '<div class="pu-bar"><div class="pu-fill" style="width:' + pct + '%; background:' + palette.fill + ';"></div></div>' +
                '<div class="pu-foot">' +
                    '<span>' + (remaining > 0 ? (remaining + ' left today') : 'Daily limit reached') + '</span>' +
                    '<span class="pu-svc">' + _puData.service.name + '</span>' +
                '</div>' +
                resetLine;

            el.style.display = 'block';

            // Restart ticker.
            if (_puTick) { clearInterval(_puTick); _puTick = null; }
            if (_puData.reset_at && remaining <= 0) {
                const tick = () => {
                    const span = document.getElementById('pu-reset-cd');
                    if (!span) return;
                    const ms = _puData.reset_at - Date.now();
                    if (ms <= 0) {
                        span.textContent = 'resetting…';
                        clearInterval(_puTick); _puTick = null;
                        setTimeout(_puFetch, 1500);
                    } else {
                        span.textContent = _puFmt(ms);
                    }
                };
                tick();
                _puTick = setInterval(tick, 1000);
            }
        }
        function startPortalUsage(slug) {
            _puSlug = slug;
            _puFetch();
            if (_puPoll) clearInterval(_puPoll);
            _puPoll = setInterval(_puFetch, 8000);
            startThemeWatcher();
        }
        function stopPortalUsage() {
            _puSlug = null;
            _puData = null;
            if (_puPoll) { clearInterval(_puPoll); _puPoll = null; }
            if (_puTick) { clearInterval(_puTick); _puTick = null; }
            stopThemeWatcher();
            const el = document.getElementById('portal-usage');
            if (el) {
                el.style.display = 'none';
                el.classList.remove('is-dark');
            }
        }

        // ---- Theme sync ----
        // Detect whether the loaded service iframe is in dark mode and
        // mirror that on the floating pill. Polls every 800ms and also
        // watches the iframe's <html> attributes when same-origin allows.
        let _puThemePoll = null;
        let _puThemeObserver = null;
        function detectIframeIsDark() {
            const frame = document.getElementById('portal-frame');
            if (!frame) return false;
            // Same-origin: read directly. Cross-origin: fall back to
            // a heuristic on the iframe's computed background color.
            try {
                const doc = frame.contentDocument;
                if (doc && doc.documentElement) {
                    const html = doc.documentElement;
                    const body = doc.body;
                    // Common patterns: tailwind's "dark" class, data-theme, or
                    // a `color-scheme: dark` style.
                    if (html.classList && html.classList.contains('dark')) return true;
                    if (body && body.classList && body.classList.contains('dark')) return true;
                    const dt = (html.getAttribute('data-theme') || body && body.getAttribute('data-theme') || '').toLowerCase();
                    if (dt === 'dark' || dt === 'night') return true;
                    if (dt === 'light') return false;
                    // Last resort: read computed background.
                    if (body) {
                        const bg = doc.defaultView.getComputedStyle(body).backgroundColor || '';
                        const m = bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
                        if (m) {
                            const lum = (parseInt(m[1]) * 0.299 + parseInt(m[2]) * 0.587 + parseInt(m[3]) * 0.114);
                            return lum < 90; // dark if perceived luminance is low
                        }
                    }
                }
            } catch (e) {
                // Cross-origin: we can't reach the doc. Assume light.
            }
            return false;
        }
        function applyIframeTheme() {
            const el = document.getElementById('portal-usage');
            if (!el) return;
            const dark = detectIframeIsDark();
            el.classList.toggle('is-dark', dark);
        }
        function startThemeWatcher() {
            stopThemeWatcher();
            // Poll-based watcher works for both same-origin and cross-origin.
            _puThemePoll = setInterval(applyIframeTheme, 800);
            applyIframeTheme();

            // For same-origin services (StealthWriter on our proxy), also
            // attach a MutationObserver to react instantly to a class flip.
            const frame = document.getElementById('portal-frame');
            try {
                if (frame && frame.contentDocument && frame.contentDocument.documentElement) {
                    _puThemeObserver = new MutationObserver(applyIframeTheme);
                    _puThemeObserver.observe(frame.contentDocument.documentElement, {
                        attributes: true, attributeFilter: ['class', 'data-theme', 'style']
                    });
                    if (frame.contentDocument.body) {
                        _puThemeObserver.observe(frame.contentDocument.body, {
                            attributes: true, attributeFilter: ['class', 'data-theme', 'style']
                        });
                    }
                }
            } catch (_) { /* cross-origin: fall back to the poll */ }

            // Re-attach the observer once the iframe finishes loading,
            // since the contentDocument we attached to may have been
            // replaced during navigation.
            if (frame) {
                frame.addEventListener('load', () => {
                    applyIframeTheme();
                    if (_puThemeObserver) {
                        try { _puThemeObserver.disconnect(); } catch(_) {}
                        _puThemeObserver = null;
                    }
                    try {
                        if (frame.contentDocument && frame.contentDocument.documentElement) {
                            _puThemeObserver = new MutationObserver(applyIframeTheme);
                            _puThemeObserver.observe(frame.contentDocument.documentElement, {
                                attributes: true, attributeFilter: ['class', 'data-theme', 'style']
                            });
                            if (frame.contentDocument.body) {
                                _puThemeObserver.observe(frame.contentDocument.body, {
                                    attributes: true, attributeFilter: ['class', 'data-theme', 'style']
                                });
                            }
                        }
                    } catch(_) {}
                }, { once: true });
            }
        }
        function stopThemeWatcher() {
            if (_puThemePoll) { clearInterval(_puThemePoll); _puThemePoll = null; }
            if (_puThemeObserver) {
                try { _puThemeObserver.disconnect(); } catch(_) {}
                _puThemeObserver = null;
            }
        }
        // The iframe forwards 429s and successful POST/PUTs as postMessage so
        // the pill updates without waiting for the next 8s poll.
        window.addEventListener('message', (e) => {
            if (!e || !e.data || !e.data.type) return;
            if (e.data.type === 'hub:limit-toast' || e.data.type === 'hub:action-done') {
                if (_puSlug) setTimeout(_puFetch, 600);
            }
        });

        socket.on('force_refresh', () => init());
        socket.on('global_reload', () => init());
        socket.on('usage_recorded', (data) => {
            // The current user just consumed a use somewhere. Refresh badges.
            // (No-op if it was a different user — server scopes the event by room.)
            if (currentUser) init();
        });

        document.getElementById('logout-btn').onclick = () => { window.location.href = '/hub/api/auth/logout'; };
        const themeBtn = document.getElementById('theme-btn'), themeCont = document.getElementById('theme-icon-container');
        function updateThemeUI(t) { themeCont.innerHTML = t==='light'?'☾':'☼'; }
        themeBtn.onclick = () => { const cur = document.documentElement.getAttribute('data-theme')||'light', next = cur==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('hub-theme', next); updateThemeUI(next); };
        const saved = localStorage.getItem('hub-theme')||'light'; document.documentElement.setAttribute('data-theme', saved); updateThemeUI(saved);
        init();
    </script>
</body>
</html>
