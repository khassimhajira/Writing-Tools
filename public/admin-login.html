<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Tools | Admin Entry</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="FAVICON.png">
</head>
<body>
    <header>
        <img src="LOGO.png" alt="Writing Tools" class="logo" onerror="this.outerHTML='<h2 class=\\'logo\\'>WRITING TOOLS</h2>'">
        <button class="theme-toggle" id="theme-btn" title="Toggle Theme">
            <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.757 7.757l.707.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </header>

    <div class="auth-container card animate-in" style="display: block;">
        <h2 style="margin-bottom:0.5rem;text-align:center;">Admin Console</h2>
        <p style="text-align:center; color:var(--text-secondary); font-size:0.85rem; margin-bottom:1.5rem;">Access privileged management tools</p>
        
        <div id="login-alert" class="alert"></div>
        
        <form id="admin-login-form">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Key</label>
                <input type="password" id="login-password" required>
                <div class="password-toggle" onclick="togglePass('login-password', this)">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                </div>
            </div>
            <button type="submit">Unlock Console</button>
        </form>
    </div>

    <footer class="site-footer">
        &copy; <span id="year"></span> Writing Tools Hub. Secure Admin Gateway.
    </footer>

    <script src="auth.js"></script>
    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        function togglePass(id, el) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                el.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path></svg>';
            } else {
                input.type = 'password';
                el.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>';
            }
        }

        const themeBtn = document.getElementById('theme-btn');
        themeBtn.onclick = () => {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        };

        // Reuse the login logic from auth.js (which attaches to #login-form)
        // We'll add a specific listener for this form too
        document.getElementById('admin-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = 'Verifying...';

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch('/hub/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok && data.user.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    const alert = document.getElementById('login-alert');
                    alert.className = 'alert alert-error';
                    alert.innerText = data.error || 'Access Denied: Admin role required.';
                    alert.style.display = 'block';
                    btn.disabled = false; btn.innerText = 'Unlock Console';
                }
            } catch(e) {
                btn.disabled = false; btn.innerText = 'Unlock Console';
            }
        };
    </script>
</body>
</html>
